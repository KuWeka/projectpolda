name: Backend Release Governance

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-release-governance.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-release-governance.yml'
  workflow_dispatch:

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: helpdesk_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: helpdesk_test
      JWT_SECRET: ci_test_jwt_secret_key_not_for_production
      JWT_REFRESH_SECRET: ci_test_refresh_secret_key_not_for_production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Import test database schema
        run: |
          mysql -h 127.0.0.1 -u root -proot helpdesk_test < sql/schema.sql

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Security audit (prod deps)
        run: npm run security:audit

      - name: Run release readiness checks
        run: npm run release:readiness
